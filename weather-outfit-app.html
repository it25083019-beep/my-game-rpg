<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日のコーデ予報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   TOKENS & THEMES
════════════════════════════════════════ */
:root {
  /* Default: Sunny */
  --sky-a: #1a0a00;
  --sky-b: #3d1500;
  --sky-c: #7a3000;
  --orb1: rgba(255,140,0,0.35);
  --orb2: rgba(255,200,60,0.2);
  --glass-bg: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.14);
  --glass-shine: rgba(255,255,255,0.22);
  --text-hi: #fff9f0;
  --text-mid: rgba(255,249,240,0.65);
  --text-lo: rgba(255,249,240,0.35);
  --accent: #ffb347;
  --accent2: #ff7a00;
  --card-shadow: 0 20px 60px rgba(0,0,0,0.45);
  --glow: 0 0 60px rgba(255,140,0,0.25);
}
.theme-rain {
  --sky-a: #020d1a; --sky-b: #071d35; --sky-c: #0e3558;
  --orb1: rgba(30,100,200,0.3); --orb2: rgba(80,160,255,0.15);
  --text-hi: #e8f4ff; --text-mid: rgba(232,244,255,0.6); --text-lo: rgba(232,244,255,0.3);
  --accent: #5bb8ff; --accent2: #1a7acc;
  --glow: 0 0 60px rgba(30,120,220,0.25);
}
.theme-cloud {
  --sky-a: #0e1520; --sky-b: #1c2535; --sky-c: #2e3d52;
  --orb1: rgba(100,140,180,0.3); --orb2: rgba(150,190,230,0.15);
  --text-hi: #e8edf5; --text-mid: rgba(232,237,245,0.6); --text-lo: rgba(232,237,245,0.3);
  --accent: #90bde0; --accent2: #5a8cbf;
  --glow: 0 0 60px rgba(90,140,200,0.2);
}
.theme-cold {
  --sky-a: #020812; --sky-b: #091428; --sky-c: #102040;
  --orb1: rgba(80,140,220,0.28); --orb2: rgba(180,220,255,0.12);
  --text-hi: #ddeeff; --text-mid: rgba(221,238,255,0.6); --text-lo: rgba(221,238,255,0.3);
  --accent: #88ccff; --accent2: #3366cc;
  --glow: 0 0 60px rgba(60,120,220,0.22);
}
.theme-storm {
  --sky-a: #050508; --sky-b: #0d0d18; --sky-c: #18182a;
  --orb1: rgba(100,60,200,0.28); --orb2: rgba(60,40,140,0.15);
  --text-hi: #ede8ff; --text-mid: rgba(237,232,255,0.6); --text-lo: rgba(237,232,255,0.3);
  --accent: #a088ff; --accent2: #6040cc;
  --glow: 0 0 60px rgba(100,60,220,0.25);
}

/* ════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--sky-a);
  color: var(--text-hi);
  overflow-x: hidden;
  overscroll-behavior: none;
  transition: background 0.8s ease;
}

/* ════════════════════════════════════════
   AMBIENT BACKGROUND
════════════════════════════════════════ */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 30% 20%, var(--orb1), transparent),
              radial-gradient(ellipse 60% 70% at 80% 70%, var(--orb2), transparent),
              linear-gradient(170deg, var(--sky-a) 0%, var(--sky-b) 45%, var(--sky-c) 100%);
  transition: all 0.9s ease;
}
.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}
/* Particle canvas */
#particleCanvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.app {
  position: relative; z-index: 10;
  max-width: 430px; margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 48px;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.header {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 56px 22px 0;
  animation: fadeDown 0.6s ease both;
}
.header-left .eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--text-lo);
}
.header-left .brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 300; font-style: italic;
  color: var(--text-hi); letter-spacing: 0.04em; margin-top: 2px;
  line-height: 1.2;
}
.header-left .brand em { font-style: normal; color: var(--accent); }

.loc-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 8px 14px 8px 10px;
  cursor: pointer; color: var(--text-hi);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; font-weight: 400;
  transition: all 0.25s;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  white-space: nowrap; max-width: 160px; overflow: hidden;
}
.loc-btn:active { transform: scale(0.95); background: var(--glass-shine); }
.loc-btn .pin { font-size: 15px; flex-shrink: 0; }
.loc-btn .loc-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.loc-btn .spinner {
  width: 12px; height: 12px; border: 2px solid var(--text-lo);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════
   WEATHER HERO CARD
════════════════════════════════════════ */
.hero-card {
  margin: 24px 16px 0;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 28px 24px 24px;
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  box-shadow: var(--card-shadow), var(--glow);
  position: relative; overflow: hidden;
  animation: fadeUp 0.7s 0.1s ease both;
  transition: box-shadow 0.8s;
}
.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
}
.hero-top {
  display: flex; align-items: flex-start; justify-content: space-between;
}
.hero-temp {
  font-family: 'Cormorant Garamond', serif;
  font-size: 88px; font-weight: 300; line-height: 0.9;
  color: var(--text-hi); letter-spacing: -4px;
}
.hero-temp sup {
  font-size: 28px; vertical-align: super;
  letter-spacing: 0; font-weight: 300;
  color: var(--accent);
}
.hero-icon-wrap {
  width: 100px; height: 100px; flex-shrink: 0;
}
.hero-icon-wrap svg { width: 100%; height: 100%; }

.hero-desc { font-size: 15px; color: var(--accent); font-weight: 500; margin-top: 10px; letter-spacing: 0.04em; }
.hero-location { font-size: 12px; color: var(--text-mid); margin-top: 4px; letter-spacing: 0.06em; }

.hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 22px;
}
.stat-pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 10px 8px;
  text-align: center;
}
.stat-val { font-size: 16px; font-weight: 700; color: var(--text-hi); }
.stat-label { font-size: 9.5px; color: var(--text-lo); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

/* Feels like bar */
.feelslike-row { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; }
.feelslike-label { font-size: 11px; color: var(--text-lo); letter-spacing: 0.08em; }
.feelslike-val { font-size: 13px; font-weight: 600; color: var(--accent); }
.progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 0 12px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 1s ease; }

/* ════════════════════════════════════════
   HOURLY FORECAST STRIP
════════════════════════════════════════ */
.section-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-lo);
  padding: 22px 22px 10px;
  animation: fadeUp 0.7s 0.2s ease both;
}
.hourly-strip {
  display: flex; gap: 10px;
  padding: 0 16px 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  animation: fadeUp 0.7s 0.25s ease both;
}
.hourly-strip::-webkit-scrollbar { display: none; }
.hour-chip {
  flex: 0 0 auto;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 18px; padding: 10px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  min-width: 60px; cursor: default;
  transition: background 0.2s, transform 0.2s;
}
.hour-chip.now { background: rgba(255,255,255,0.14); border-color: var(--accent); }
.hour-chip:active { transform: scale(0.94); }
.hour-time { font-size: 10px; color: var(--text-lo); letter-spacing: 0.05em; }
.hour-icon { font-size: 18px; }
.hour-temp { font-size: 14px; font-weight: 600; color: var(--text-hi); }
.hour-chip.now .hour-time { color: var(--accent); font-weight: 600; }

/* ════════════════════════════════════════
   OUTFIT SECTION
════════════════════════════════════════ */
.outfit-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 22px 12px;
  animation: fadeUp 0.7s 0.3s ease both;
}
.outfit-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400; font-style: italic;
  color: var(--text-hi); line-height: 1.2;
}
.outfit-tagline em { font-style: normal; color: var(--accent); }
.outfit-count {
  font-size: 11px; color: var(--text-lo);
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  padding: 4px 12px; border-radius: 12px; flex-shrink: 0;
}

/* ── Outfit carousel ── */
.outfit-rail {
  display: flex; gap: 12px;
  padding: 0 16px 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-snap-type: x mandatory;
  animation: fadeUp 0.7s 0.35s ease both;
}
.outfit-rail::-webkit-scrollbar { display: none; }

.o-card {
  flex: 0 0 138px;
  scroll-snap-align: start;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 18px 14px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}
.o-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
}
.o-card:active { transform: scale(0.95) translateY(2px); box-shadow: none; }
.o-card.featured { border-color: rgba(255,255,255,0.22); }

.o-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--accent); text-transform: uppercase;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  padding: 2px 7px; border-radius: 6px;
}
.o-emoji { font-size: 44px; line-height: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
.o-name { font-size: 13px; font-weight: 500; color: var(--text-hi); text-align: center; line-height: 1.3; }
.o-tip { font-size: 10.5px; color: var(--text-lo); text-align: center; line-height: 1.45; }

/* progress dots */
.rail-dots {
  display: flex; justify-content: center; gap: 5px;
  padding: 10px 0 4px;
}
.rdot {
  height: 3px; border-radius: 2px;
  background: var(--text-lo); width: 16px;
  transition: all 0.3s;
}
.rdot.on { background: var(--accent); width: 28px; }

/* ════════════════════════════════════════
   ACTION BUTTONS
════════════════════════════════════════ */
.actions {
  display: flex; gap: 10px; padding: 18px 16px 0;
  animation: fadeUp 0.7s 0.45s ease both;
}
.btn-main {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 54px;
  background: linear-gradient(130deg, var(--accent2), var(--accent));
  border: none; border-radius: 17px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  color: #fff; cursor: pointer; text-transform: uppercase;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px var(--orb1);
  transition: transform 0.15s, opacity 0.15s;
}
.btn-main:active { transform: scale(0.96); opacity: 0.9; }
.btn-icon {
  flex: 0 0 54px; height: 54px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 17px; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
}
.btn-icon:active { transform: scale(0.93); background: var(--glass-shine); }
.btn-icon.saved { background: rgba(255,80,80,0.15); border-color: rgba(255,100,100,0.3); }

/* ════════════════════════════════════════
   WEATHER SWITCHER (demo)
════════════════════════════════════════ */
.switcher-wrap {
  padding: 24px 16px 0;
  animation: fadeUp 0.7s 0.5s ease both;
}
.switcher-label {
  font-size: 9px; color: var(--text-lo); letter-spacing: 0.2em;
  text-transform: uppercase; text-align: center; margin-bottom: 10px;
}
.switcher {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
}
.sw-btn {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-radius: 14px; padding: 10px 4px 8px;
  cursor: pointer; text-align: center;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  transition: all 0.2s;
}
.sw-btn:active { transform: scale(0.93); }
.sw-btn.on { background: rgba(255,255,255,0.14); border-color: var(--accent); }
.sw-emoji { font-size: 18px; display: block; margin-bottom: 3px; }
.sw-label { font-size: 9px; color: var(--text-mid); display: block; font-weight: 500; }
.sw-btn.on .sw-label { color: var(--accent); font-weight: 700; }

/* ════════════════════════════════════════
   DETAIL BOTTOM SHEET
════════════════════════════════════════ */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none; transition: opacity 0.35s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: linear-gradient(170deg, var(--sky-b) 0%, var(--sky-a) 100%);
  border: 1px solid var(--glass-border);
  border-bottom: none; border-radius: 28px 28px 0 0;
  padding: 14px 20px 52px;
  max-height: 78vh; overflow-y: auto;
  transition: transform 0.45s cubic-bezier(.2, 1.1, .4, 1);
  box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
}
.sheet::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
}
.sheet-overlay.open .sheet { transform: translateX(-50%) translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.18); margin: 0 auto 22px; }
.sheet-close {
  position: absolute; top: 14px; right: 18px;
  font-size: 20px; cursor: pointer; color: var(--text-lo); line-height: 1;
}
.sheet-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400;
  color: var(--text-hi); margin-bottom: 6px;
}
.sheet-sub { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 22px; }
.sheet-items { display: flex; flex-direction: column; gap: 10px; }
.sheet-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 18px; padding: 14px 16px;
  transition: background 0.18s;
}
.sheet-item:active { background: var(--glass-shine); }
.s-emoji { font-size: 32px; flex-shrink: 0; }
.s-name { font-size: 14px; font-weight: 600; color: var(--text-hi); }
.s-desc { font-size: 11.5px; color: var(--text-lo); margin-top: 3px; line-height: 1.45; }
.s-badge {
  margin-left: auto; font-size: 9px; font-weight: 700;
  color: var(--accent); border: 1px solid var(--accent);
  padding: 2px 8px; border-radius: 8px; flex-shrink: 0; letter-spacing: 0.08em;
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(20,20,20,0.92);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 16px; padding: 11px 22px;
  font-size: 13px; font-weight: 400; color: var(--text-hi);
  opacity: 0; pointer-events: none; z-index: 300;
  transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.up { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════
   LOADING SCREEN
════════════════════════════════════════ */
.loading-screen {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #050505; transition: opacity 0.6s, visibility 0.6s;
}
.loading-screen.hidden { opacity: 0; visibility: hidden; }
.loading-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px; font-weight: 300; font-style: italic;
  color: #fff; margin-bottom: 32px; letter-spacing: 0.04em;
}
.loading-logo em { font-style: normal; color: #ff9a3c; }
.loading-bar-wrap { width: 160px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
.loading-bar { height: 100%; border-radius: 1px; background: linear-gradient(90deg, #ff7a00, #ffcc44); animation: loadProgress 1.8s ease forwards; }
@keyframes loadProgress { from { width: 0; } to { width: 100%; } }
.loading-msg { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 14px; letter-spacing: 0.12em; }

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }
@keyframes fadeUp   { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

/* ════════════════════════════════════════
   WEATHER SVG ANIMATIONS
════════════════════════════════════════ */
.sun-rays { animation: raysRotate 18s linear infinite; transform-origin: 50px 50px; }
@keyframes raysRotate { to { transform: rotate(360deg); } }
.sun-body { animation: sunBreath 3s ease-in-out infinite; transform-origin: 50px 50px; }
@keyframes sunBreath { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
.cloud-main { animation: cloudDrift 5s ease-in-out infinite; }
@keyframes cloudDrift { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
.raindrop { animation: rainAnim 1.3s linear infinite; }
.raindrop:nth-child(2n) { animation-delay: 0.22s; }
.raindrop:nth-child(3n) { animation-delay: 0.44s; }
.raindrop:nth-child(4n) { animation-delay: 0.11s; }
@keyframes rainAnim { 0%{transform:translateY(-8px);opacity:0;} 30%{opacity:0.9;} 100%{transform:translateY(18px);opacity:0;} }
.flake { animation: flakeFall 2.4s ease-in-out infinite; }
.flake:nth-child(2n){ animation-delay: 0.6s; }
.flake:nth-child(3n){ animation-delay: 1.2s; }

/* ══════════════════════════════════════════
   PARTICLE SYSTEM
══════════════════════════════════════════ */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let particleType = 'none';

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initParticles(type) {
  particleType = type;
  particles = [];
  const count = type === 'rain' ? 55 : type === 'cold' ? 35 : type === 'storm' ? 70 : 0;
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      speed: type === 'rain' || type === 'storm' ? 3 + Math.random() * 4 : 0.5 + Math.random() * 1.5,
      angle: type === 'storm' ? 0.4 : type === 'rain' ? 0.15 : Math.random() * Math.PI * 2,
      size: type === 'cold' ? 2 + Math.random() * 3 : 1.5,
      opacity: 0.1 + Math.random() * 0.35,
      drift: (Math.random() - 0.5) * 0.5,
    });
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!particles.length) return;
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    if (particleType === 'cold') {
      ctx.fillStyle = '#a8d8ff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.strokeStyle = particleType === 'storm' ? '#4466aa' : '#5588cc';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      const len = particleType === 'storm' ? 16 : 10;
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.sin(p.angle) * len, p.y + Math.cos(p.angle) * len);
      ctx.stroke();
    }
    ctx.restore();
    p.y += p.speed;
    p.x += p.drift;
    if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
    if (p.x > canvas.width + 20) { p.x = -20; }
    if (p.x < -20) { p.x = canvas.width + 20; }
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ══════════════════════════════════════════
   GEOLOCATION → REVERSE GEOCODE → OWM
══════════════════════════════════════════ */
async function getLocation() {
  document.getElementById('loadMsg').textContent = '位置情報を取得中…';
  document.getElementById('locText').textContent = '取得中…';

  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve(false);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        document.getElementById('loadMsg').textContent = '天気データを取得中…';
        // Reverse geocode with nominatim (no key needed)
        try {
          const geoRes = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`,
            { headers: { 'Accept-Language': 'ja' } }
          );
          const geoData = await geoRes.json();
          const addr = geoData.address;
          locationName = addr.city || addr.town || addr.village || addr.county || addr.state || '現在地';
        } catch { locationName = '現在地'; }
        resolve(true);
      },
      () => resolve(false),
      { timeout: 8000, maximumAge: 300000 }
    );
  });
}

  if (!lat || !lon) return null;
  if (OWM_KEY === 'PASTE_YOUR_OPENWEATHERMAP_API_KEY_HERE') return null;
  try {
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${OWM_KEY}&units=metric&lang=ja`
    );
    if (!res.ok) return null;
    const d = await res.json();
    return d;
  } catch { return null; }
}

function owmToKey(owmData) {
  if (!owmData) return null;
  const id = owmData.weather[0].id;
  if (id >= 200 && id < 300) return 'storm';
  if (id >= 300 && id < 600) return 'rain';
  if (id >= 600 && id < 700) return 'cold';
  if (id >= 700 && id < 800) return 'cloud';
  if (id === 800) return 'sunny';
  if (id > 800) return 'cloud';
  return 'sunny';
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render(key, owmData) {
  currentKey = key;
  const d = WX[key];

  // Theme
  document.body.classList.remove('theme-rain','theme-cloud','theme-cold','theme-storm');
  if (d.theme) document.body.classList.add(d.theme);

  // Icon
  document.getElementById('heroIcon').innerHTML = makeSVG(d.icon);

  // Temp — use real data if available
  const temp = owmData ? Math.round(owmData.main.temp) : d.temp;
  const feel = owmData ? Math.round(owmData.main.feels_like) : d.feel;
  const hum  = owmData ? owmData.main.humidity + '%' : d.hum;
  const wind = owmData ? Math.round(owmData.wind.speed * 3.6) + 'km/h' : d.wind;
  const vis  = owmData ? (owmData.visibility / 1000).toFixed(1) + 'km' : d.vis;
  const descText = owmData ? owmData.weather[0].description : d.desc;

  document.getElementById('tempNum').textContent = temp;
  document.getElementById('heroDesc').textContent = descText;
  document.getElementById('heroLoc').textContent = '📍 ' + locationName;
  document.getElementById('feelVal').textContent = feel + '°';
  document.getElementById('statHum').textContent = hum;
  document.getElementById('statWind').textContent = wind;
  document.getElementById('statVis').textContent = vis;
  document.getElementById('locText').textContent = locationName;

  // Feel bar (map temp 0-42°C to 0-100%)
  const pct = Math.min(100, Math.max(5, ((feel - 0) / 42) * 100));
  document.getElementById('feelBar').style.width = pct + '%';

  // Hourly
  const hourlyEl = document.getElementById('hourlyStrip');
  hourlyEl.innerHTML = '';
  d.hourly.forEach((h, i) => {
    const chip = document.createElement('div');
    chip.className = 'hour-chip' + (i === 0 ? ' now' : '');
    chip.innerHTML = `<div class="hour-time">${h.t}</div><div class="hour-icon">${h.ic}</div><div class="hour-temp">${h.deg}°</div>`;
    hourlyEl.appendChild(chip);
  });

  // Outfit tagline
  document.getElementById('outfitTagline').innerHTML = d.tagline;
  document.getElementById('outfitCount').textContent = d.outfits.length + ' アイテム';

  // Outfit cards
  const rail = document.getElementById('outfitRail');
  rail.innerHTML = '';
  d.outfits.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'o-card' + (i < 2 ? ' featured' : '');
    card.innerHTML = `
      ${item.b ? `<div class="o-badge">${item.b}</div>` : ''}
      <div class="o-emoji">${item.e}</div>
      <div class="o-name">${item.n}</div>
      <div class="o-tip">${item.t}</div>
    `;
    card.addEventListener('click', () => toast('✦ ' + item.n));
    rail.appendChild(card);
  });

  // Dots
  const dotsEl = document.getElementById('railDots');
  const dotCount = Math.ceil(d.outfits.length / 2);
  dotsEl.innerHTML = '';
  for (let i = 0; i < dotCount; i++) {
    const dot = document.createElement('div');
    dot.className = 'rdot' + (i === 0 ? ' on' : '');
    dotsEl.appendChild(dot);
  }
  rail.addEventListener('scroll', () => {
    const idx = Math.round(rail.scrollLeft / ((138 + 12) * 2));
    dotsEl.querySelectorAll('.rdot').forEach((dot, j) => {
      dot.classList.toggle('on', j === Math.min(idx, dotCount - 1));
    });
  }, { passive: true });

  // Particles
  const ptype = key === 'rain' ? 'rain' : key === 'storm' ? 'storm' : key === 'cold' ? 'cold' : 'none';
  initParticles(ptype);

  // Switcher highlight
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.toggle('on', b.dataset.k === key));

  // Reset save
  savedState = false;
  document.getElementById('btnSave').textContent = '🤍';
  document.getElementById('btnSave').classList.remove('saved');
}

/* ══════════════════════════════════════════
   SHEET MODAL
══════════════════════════════════════════ */
function openSheet() {
  const d = WX[currentKey];
  document.getElementById('sheetTitle').textContent = d.modalTitle;
  document.getElementById('sheetSub').textContent = d.modalSub;
  const container = document.getElementById('sheetItems');
  container.innerHTML = '';
  d.outfits.forEach(item => {
    const el = document.createElement('div');
    el.className = 'sheet-item';
    el.innerHTML = `
      <div class="s-emoji">${item.e}</div>
      <div style="flex:1">
        <div class="s-name">${item.n}</div>
        <div class="s-desc">${item.t}</div>
      </div>
      ${item.b ? `<div class="s-badge">${item.b}</div>` : ''}
    `;
    container.appendChild(el);
  });
  document.getElementById('sheetOverlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('up');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => el.classList.remove('up'), 2200);
}

/* ══════════════════════════════════════════
   SWITCHER BUILD
══════════════════════════════════════════ */
function buildSwitcher() {
  const data = [
    { k:'sunny', emoji:'☀️', label:'晴れ' },
    { k:'rain',  emoji:'🌧', label:'雨' },
    { k:'cloud', emoji:'⛅', label:'曇り' },
    { k:'cold',  emoji:'❄️', label:'寒い' },
    { k:'storm', emoji:'⛈️', label:'嵐' },
  ];
  const el = document.getElementById('switcher');
  data.forEach(sw => {
    const btn = document.createElement('button');
    btn.className = 'sw-btn' + (sw.k === currentKey ? ' on' : '');
    btn.dataset.k = sw.k;
    btn.innerHTML = `<span class="sw-emoji">${sw.emoji}</span><span class="sw-label">${sw.label}</span>`;
    btn.addEventListener('click', () => render(sw.k, null));
    el.appendChild(btn);
  });
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() {
  setDate();
  buildSwitcher();

  // Events
  document.getElementById('btnDetail').addEventListener('click', openSheet);
  document.getElementById('sheetOverlay').addEventListener('click', e => { if(e.target.id==='sheetOverlay') closeSheet(); });
  document.getElementById('sheetClose').addEventListener('click', closeSheet);
  document.getElementById('btnShuffle').addEventListener('click', () => {
    const rail = document.getElementById('outfitRail');
    const items = WX[currentKey].outfits;
    const ri = Math.floor(Math.random() * (items.length - 1));
    rail.scrollTo({ left: ri * (138 + 12), behavior: 'smooth' });
    toast('🔀 コーデをシャッフルしました');
  });
  document.getElementById('btnSave').addEventListener('click', () => {
    savedState = !savedState;
    const btn = document.getElementById('btnSave');
    btn.textContent = savedState ? '❤️' : '🤍';
    btn.classList.toggle('saved', savedState);
    toast(savedState ? '❤️ コーデを保存しました' : 'コーデの保存を解除しました');
  });
  document.getElementById('locBtn').addEventListener('click', async () => {
    document.getElementById('locText').innerHTML = '<span class="spinner"></span>';
    const ok = await getLocation();
    if (ok) {
      const owm = await fetchWeatherFromOWM();
      const key = owmToKey(owm) || currentKey;
      render(key, owm);
      toast('📍 ' + locationName + ' の天気を取得しました');
    } else {
      document.getElementById('locText').textContent = locationName;
      toast('位置情報の取得に失敗しました');
    }
  });

  // Try to get real location on load
  const located = await getLocation();
  let owmData = null;
  let weatherKey = 'sunny';

  if (located) {
    owmData = await fetchWeatherFromOWM();
    weatherKey = owmToKey(owmData) || 'sunny';
  }

  render(weatherKey, owmData);

  // Hide loading
  setTimeout(() => {
    document.getElementById('loadScreen').classList.add('hidden');
  }, 400);
}

init();
</script>

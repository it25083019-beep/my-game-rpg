<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ジャンケンRPG WORLD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --sky: #5c94fc;
    --sky2: #9ab8ff;
    --ground: #e86a17;
    --ground2: #c85000;
    --brick: #c84c0c;
    --coin: #ffd700;
    --mario-red: #e52222;
    --mario-blue: #2b7fff;
    --text: #fff;
    --shadow: rgba(0,0,0,0.5);
    --panel-bg: rgba(0,0,0,0.82);
    --panel-border: rgba(255,255,255,0.18);
    --hp-green: #2ecc40;
    --hp-red: #ff2222;
    --item-gold: #ffd700;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    overflow-x: hidden;
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    background: var(--sky);
    touch-action: manipulation;
  }

  /* ===================== PARALLAX SKY ===================== */
  .world-bg {
    position: fixed;
    inset: 0;
    z-index: -3;
    background: linear-gradient(180deg, #5c94fc 0%, #9ab8ff 60%, #c8e4ff 100%);
    overflow: hidden;
  }
  .world-bg .cloud {
    position: absolute;
    background: white;
    border-radius: 999px;
    opacity: 0.9;
    image-rendering: pixelated;
  }
  .c1{width:80px;height:28px;top:8%;left:5%;animation:cloudMove 18s linear infinite;}
  .c2{width:56px;height:20px;top:18%;left:60%;animation:cloudMove 24s linear infinite 4s;}
  .c3{width:100px;height:34px;top:12%;left:35%;animation:cloudMove 20s linear infinite 8s;}
  .c1::before,.c2::before,.c3::before{
    content:"";position:absolute;background:white;border-radius:999px;
    width:52%;height:150%;top:-60%;left:20%;
  }
  .c1::after,.c2::after,.c3::after{
    content:"";position:absolute;background:white;border-radius:999px;
    width:40%;height:120%;top:-40%;right:18%;
  }

  /* HILLS pixel style */
  .world-bg .hill {
    position: absolute;
    bottom: 0;
    border-radius: 50% 50% 0 0;
    opacity: 0.22;
  }
  .h1{width:220px;height:100px;background:#3a8a30;left:-20px;}
  .h2{width:300px;height:140px;background:#2e7a28;right:-40px;}

  /* GROUND BAR */
  .ground-strip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    z-index: -2;
    background: linear-gradient(180deg, var(--ground) 0 16px, var(--ground2) 16px);
    border-top: 4px solid #a83e00;
  }
  .ground-strip::before {
    content:"";
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(90deg,
      rgba(255,255,255,0.08) 0 2px,
      transparent 2px 32px
    );
  }

  @keyframes cloudMove {
    from{transform:translateX(0);}
    to{transform:translateX(110vw);}
  }

  /* ===================== SCREENS ===================== */
  .screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }
  .screen.active { display: flex; }

  /* ===================== TITLE SCREEN ===================== */
  #titleScreen {
    background: linear-gradient(180deg, #2442a0 0%, #1a2d78 100%);
    gap: 18px;
  }
  .title-logo {
    text-align: center;
    margin-bottom: 8px;
  }
  .title-logo .sub {
    font-size: 10px;
    color: #ffd700;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
    text-shadow: 2px 2px 0 #8b6200;
  }
  .title-logo h1 {
    font-size: clamp(18px, 5vw, 26px);
    color: #ffd700;
    text-shadow: 3px 3px 0 #8b6200, 6px 6px 0 rgba(0,0,0,0.4);
    line-height: 1.4;
  }
  .mario-castle-deco {
    width: 120px;
    margin: 0 auto 4px;
  }
  .press-start {
    font-size: 12px;
    color: #fff;
    animation: blink 1s step-end infinite;
    margin-top: 8px;
  }
  @keyframes blink { 50%{opacity:0;} }

  /* ===================== CHARACTER SELECT ===================== */
  #selectScreen {
    background: linear-gradient(180deg, #1a2d78, #0d1a4a);
    gap: 14px;
  }
  .select-title {
    font-size: 13px;
    color: #ffd700;
    text-shadow: 2px 2px 0 #6b4400;
    text-align: center;
    margin-bottom: 6px;
  }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 400px;
  }
  .char-card {
    background: rgba(0,0,0,0.7);
    border: 3px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .char-card:hover, .char-card.selected {
    border-color: #ffd700;
    transform: scale(1.04);
    background: rgba(255,215,0,0.12);
  }
  .char-card svg { width: 72px; height: 72px; }
  .char-name { font-size: 9px; color: #ffd700; }
  .char-stats { font-size: 7px; color: #aac8ff; line-height: 2; }
  .char-desc { font-size: 7px; color: rgba(255,255,255,0.6); line-height: 1.6; }
  .btn-start {
    background: linear-gradient(180deg, #ffd700, #ff8c00);
    color: #1a0000;
    border: 3px solid #8b4500;
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 0 5px 0 #5a2d00, 0 10px 20px rgba(0,0,0,0.4);
    transition: transform 0.08s, box-shadow 0.08s;
    margin-top: 6px;
  }
  .btn-start:active { transform: translateY(4px); box-shadow: 0 1px 0 #5a2d00; }
  .btn-start:disabled { filter: grayscale(0.7) brightness(0.6); cursor: not-allowed; }

  /* ===================== GAME SCREEN ===================== */
  #gameScreen {
    background: transparent;
    flex-direction: column;
    gap: 0;
    padding: 0;
    justify-content: flex-start;
    overflow-y: auto;
    padding-bottom: 72px;
  }

  .game-inner {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 10px 10px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.78);
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    backdrop-filter: blur(6px);
  }
  .topbar .score-block { font-size: 10px; color: #ffd700; }
  .topbar .score-block span { display: block; font-size: 13px; color: #fff; margin-top: 2px; }
  .topbar .stage-block {
    background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    font-size: 9px;
    color: #aac8ff;
  }
  .topbar .stage-block span { display: block; font-size: 15px; color: #fff; margin-top: 2px; }
  .btn-stat {
    background: linear-gradient(180deg, #7f3fbf, #5a2a8a);
    border: 2px solid #9b59b6;
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 0 #3a1a5a;
  }
  .btn-stat:active { transform: translateY(2px); }

  /* ENEMY CARD */
  .fighter-card {
    background: rgba(0,0,0,0.78);
    border-radius: 16px;
    padding: 12px;
    border: 2px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(6px);
    position: relative;
  }
  .fighter-card.enemy-card { border-color: rgba(255,80,80,0.3); }
  .fighter-card.player-card { border-color: rgba(255,215,0,0.25); }
  .fighter-card.boss-card { border-color: rgba(184,91,255,0.5); box-shadow: 0 0 24px rgba(184,91,255,0.2); }

  .fighter-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 8px;
  }
  .fighter-name { font-size: 11px; color: #ffd700; }
  .fighter-name.enemy-name { color: #ff8080; }
  .fighter-tag {
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    white-space: nowrap;
  }
  .tag-boss { background: rgba(184,91,255,0.2); border-color: rgba(184,91,255,0.4); color: #d891ff; }
  .tag-normal { color: #aac8ff; }
  .tag-player { color: #ffd700; }

  .hp-bar-wrap { margin-bottom: 4px; }
  .hp-label {
    display: flex; justify-content: space-between;
    font-size: 9px; color: rgba(255,255,255,0.6); margin-bottom: 4px;
  }
  .hp-bar {
    height: 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hp-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #1aaa40, #3df572);
    transition: width 0.35s ease;
    box-shadow: 0 0 10px rgba(57,220,100,0.4);
  }
  .hp-fill.low {
    background: linear-gradient(90deg, #cc1122, #ff4455);
    box-shadow: 0 0 10px rgba(255,50,80,0.4);
  }
  .hp-fill.medium {
    background: linear-gradient(90deg, #cc8800, #ffbb00);
    box-shadow: 0 0 10px rgba(255,180,0,0.4);
  }

  /* BATTLE VIEW */
  .battle-view {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 110px;
    position: relative;
    margin-top: 6px;
  }
  .sprite-box {
    width: min(38vw, 130px);
    aspect-ratio: 1;
    display: grid;
    place-items: center;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.5));
    position: relative;
    z-index: 1;
  }
  .sprite-box svg { width: 100%; height: 100%; overflow: visible; }
  .enemy-card .sprite-box { animation: bob 2.2s ease-in-out infinite; }
  .player-card .sprite-box { animation: bob 2.6s ease-in-out infinite reverse; }

  @keyframes bob {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }

  .hand-badge {
    position: absolute;
    right: 8px;
    bottom: 6px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 5px 8px;
    font-size: 9px;
    text-align: center;
    min-width: 58px;
  }
  .hand-badge .hem { display: block; font-size: 18px; margin-bottom: 2px; }

  .dmg-pop {
    position: absolute;
    left: 50%; top: 30%;
    transform: translate(-50%,-50%);
    font-size: 16px;
    color: #fff;
    background: rgba(255,40,60,0.9);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 6px 12px;
    pointer-events: none;
    opacity: 0;
    z-index: 20;
  }
  .dmg-pop.heal { background: rgba(20,200,80,0.9); }
  .dmg-pop.show { animation: popUp 0.7s ease both; }

  @keyframes popUp {
    0%{opacity:0;transform:translate(-50%,-20%) scale(0.7);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}
    100%{opacity:0;transform:translate(-50%,-110%) scale(1);}
  }

  /* CENTER PANEL */
  .center-panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .vs-line {
    text-align: center;
    font-size: 16px;
    color: #ffd700;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    position: relative;
  }
  .vs-line::before,.vs-line::after {
    content:"";
    position:absolute;
    top:50%;
    width: 30%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
  }
  .vs-line::before{left:4%;}
  .vs-line::after{right:4%;}

  .log-box {
    background: rgba(0,0,0,0.82);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 10px 14px;
    min-height: 70px;
    font-size: 11px;
    line-height: 1.8;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: pre-line;
    backdrop-filter: blur(4px);
  }

  /* ITEM BAR */
  .item-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    border: 2px solid rgba(255,215,0,0.15);
  }
  .item-label { font-size: 8px; color: #aac8ff; margin-right: 4px; }
  .item-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: rgba(255,215,0,0.12);
    border: 2px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 6px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ffd700;
    cursor: pointer;
    transition: transform 0.08s, background 0.1s;
    min-width: 58px;
    text-align: center;
    position: relative;
  }
  .item-btn .item-icon { font-size: 18px; display: block; }
  .item-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    filter: grayscale(0.8);
  }
  .item-btn:not(:disabled):active { transform: scale(0.93); }
  .item-btn .used-mark {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    border-radius: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #ff6666;
  }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .choice-btn {
    min-height: 80px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.4), 0 10px 24px rgba(0,0,0,0.3);
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before {
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:40%;
    background: rgba(255,255,255,0.18);
    border-radius: inherit;
    pointer-events: none;
  }
  .choice-btn[data-hand="rock"] { background: linear-gradient(180deg, #ff7c2a, #cc4800); color: #fff3e0; }
  .choice-btn[data-hand="paper"] { background: linear-gradient(180deg, #2ecc71, #1a8a4a); color: #e0fff0; }
  .choice-btn[data-hand="scissors"] { background: linear-gradient(180deg, #3498db, #1a6ba0); color: #e0f4ff; }
  .choice-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
  .choice-btn:disabled { filter: grayscale(0.6) brightness(0.55); cursor: not-allowed; }
  .choice-btn .btn-icon { font-size: 26px; }
  .choice-btn .btn-text { font-size: 12px; }
  .choice-btn .btn-hint { font-size: 8px; opacity: 0.75; }

  /* ===================== MODAL OVERLAYS ===================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal-box {
    background: linear-gradient(180deg, #1a2a50, #0d1a38);
    border: 3px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 380px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 13px;
    color: #ffd700;
    text-shadow: 2px 2px 0 #6b4400;
    margin-bottom: 16px;
    text-align: center;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 9px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .sl { color: rgba(255,255,255,0.6); }
  .stat-row .sv { color: #ffd700; }
  .stat-char-preview svg { width: 80px; height: 80px; display: block; margin: 0 auto 12px; }
  .modal-close-btn {
    width: 100%;
    margin-top: 14px;
    background: linear-gradient(180deg, #ffd700, #cc8800);
    border: 2px solid #8b5500;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #1a0000;
    cursor: pointer;
    box-shadow: 0 4px 0 #5a3300;
  }

  /* STAGE CLEAR / GAMEOVER OVERLAY */
  .result-overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: rgba(0,0,0,0.78);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    gap: 14px;
    text-align: center;
  }
  .result-overlay.active { display: flex; }
  .result-title {
    font-size: clamp(20px, 6vw, 30px);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.6);
    animation: scaleIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  .result-title.win { color: #ffd700; }
  .result-title.lose { color: #ff4444; }
  .result-sub { font-size: 10px; color: rgba(255,255,255,0.8); line-height: 2; }
  .result-heal { font-size: 10px; color: #3df572; }
  .btn-next, .btn-restart {
    background: linear-gradient(180deg, #ffd700, #ff8c00);
    color: #1a0000;
    border: 3px solid #8b4500;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 0 5px 0 #5a2d00;
  }
  .btn-restart { background: linear-gradient(180deg, #e84444, #aa2222); color: #fff; border-color: #6b0000; box-shadow: 0 5px 0 #3a0000; }

  @keyframes scaleIn {
    from{transform:scale(0.5) rotate(-5deg);opacity:0;}
    to{transform:scale(1) rotate(0deg);opacity:1;}
  }

  /* FLASH */
  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: rgba(255,255,255,0.6);
    opacity: 0;
    z-index: 55;
  }
  .flash.on { animation: flashAnim 0.22s ease-out; }
  @keyframes flashAnim {
    0%{opacity:0;} 25%{opacity:1;} 100%{opacity:0;}
  }

  /* NOTICE TOAST */
  .notice-toast {
    position: fixed;
    left: 50%;
    top: 38%;
    transform: translate(-50%,-50%) scale(0.8);
    padding: 16px 24px;
    border-radius: 18px;
    font-size: clamp(18px, 5vw, 26px);
    font-weight: bold;
    text-align: center;
    background: linear-gradient(135deg, rgba(200,60,60,0.97), rgba(160,70,240,0.97));
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    pointer-events: none;
    opacity: 0;
    z-index: 56;
  }
  .notice-toast.show { animation: noticeAnim 1.2s ease both; }
  @keyframes noticeAnim {
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)rotate(-4deg);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.08)rotate(1deg);}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.1);}
  }

  /* ATTACK / HIT ANIMATIONS */
  .sprite-box.attack { animation: attackAnim 0.28s ease !important; }
  .sprite-box.hit { animation: hitAnim 0.28s ease !important; }
  .fighter-card.shaking { animation: cardShake 0.28s ease !important; }
  @keyframes attackAnim {
    0%,100%{transform:translateY(0)scale(1);}
    40%{transform:translateY(-10px)scale(1.08);}
  }
  @keyframes hitAnim {
    0%,100%{transform:translateX(0)scale(1);}
    20%{transform:translateX(-10px)scale(1.04);filter:brightness(1.5);}
    50%{transform:translateX(9px)scale(0.96);}
  }
  @keyframes cardShake {
    0%,100%{transform:translate(0);}
    20%{transform:translate(-5px,3px);}
    40%{transform:translate(5px,-2px);}
    60%{transform:translate(-3px,-3px);}
    80%{transform:translate(3px,3px);}
  }

  /* STAGE PROGRESS BAR */
  .stage-progress {
    display: flex;
    gap: 4px;
    align-items: center;
    overflow-x: auto;
    padding: 6px 10px;

// ================================================================
// GAME STATE
// ================================================================
const G = {
  char: null,
  stage: 0,
  score: 0,
  playerHp: 0,
  playerMaxHp: 0,
  enemyHp: 0,
  enemy: null,
  locked: false,
  items: { mushroom: true, star: true, flower: true, shell: true },
  starActive: false,
  shellActive: false,
  wins: 0,
};

// ================================================================
// HELPERS
// ================================================================
const $ = id => document.getElementById(id);
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function hpPct(cur,max){ return clamp(cur/max*100,0,100); }

function setHpBar(fillEl, txtEl, cur, max) {
  const pct = hpPct(cur,max);
  fillEl.style.width = pct + "%";
  fillEl.classList.remove("low","medium");
  if (pct <= 25) fillEl.classList.add("low");
  else if (pct <= 55) fillEl.classList.add("medium");
  if (txtEl) txtEl.textContent = `${cur} / ${max}`;
}

function showNotice(txt) {
  const n = $("notice");
  n.textContent = txt;
  n.classList.remove("show");
  void n.offsetWidth;
  n.classList.add("show");
}

function triggerFlash() {
  const f = $("flash");
  f.classList.remove("on");
  void f.offsetWidth;
  f.classList.add("on");
}

function showDmg(popId, amount, isHeal=false) {
  const el = $(popId);
  el.textContent = isHeal ? `+${amount}` : `-${amount}`;
  el.classList.toggle("heal", isHeal);
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

function setBadge(elId, handKey, fallback) {
  const el = $(elId);
  if (!handKey) { el.innerHTML = `<span class="hem">？</span>${fallback}`; return; }
  el.innerHTML = `<span class="hem">${HANDS[handKey].emoji}</span>${HANDS[handKey].jp}`;
}

function triggerImpact(cardId, spriteId) {
  const card = $(cardId);
  const sprite = $(spriteId);
  card.classList.remove("shaking"); sprite.classList.remove("hit","attack");
  void card.offsetWidth;
  card.classList.add("shaking"); sprite.classList.add("hit");
  triggerFlash();
}

function triggerAttack(spriteId) {
  const sprite = $(spriteId);
  sprite.classList.remove("attack");
  void sprite.offsetWidth;
  sprite.classList.add("attack");
}

function disableControls(v) {
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = v);
  ["itemMushroom","itemStar","itemFlower","itemShell"].forEach(id => {
    const b = $(id);
    if (b) b.disabled = v || !G.items[id.replace("item","").toLowerCase()];
  });
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function randomHand() {
  const keys = Object.keys(HANDS);
  return keys[Math.floor(Math.random() * keys.length)];
}

function judge(p, e) {
  if (p === e) return "draw";
  return HANDS[p].beats === e ? "win" : "lose";
}

// ================================================================
// CHARACTER SELECT
// ================================================================
function buildCharGrid() {
  const grid = $("charGrid");
  grid.innerHTML = "";
  CHARS.forEach(c => {
    const div = document.createElement("div");
    div.className = "char-card";
    div.dataset.id = c.id;
    div.innerHTML = `
      ${SPRITES[c.spriteKey]}
      <div class="char-name">${c.name}</div>
      <div class="char-stats">${c.stats}</div>
      <div class="char-desc">${c.desc}</div>
    `;
    div.onclick = () => {
      document.querySelectorAll(".char-card").forEach(x => x.classList.remove("selected"));
      div.classList.add("selected");
      G.char = c;
      $("confirmCharBtn").disabled = false;
    };
    grid.appendChild(div);
  });
}

function confirmChar() {
  if (!G.char) return;
  startGame();
}

// ================================================================
// GAME START
// ================================================================
function startGame() {
  const c = G.char;
  G.stage = 0;
  G.score = 0;
  G.playerMaxHp = c.maxHp;
  G.playerHp = c.maxHp;
  G.items = { mushroom: true, star: true, flower: true, shell: true };
  G.starActive = false;
  G.shellActive = false;
  G.wins = 0;

  $("playerNameDisplay").textContent = c.name;
  $("playerSpriteBox").innerHTML = SPRITES[c.spriteKey];

  buildStageProgress();
  loadStage(G.stage);
  updateItemButtons();
  showScreen("gameScreen");
}

function buildStageProgress() {
  const bar = $("stageProgress");
  bar.innerHTML = "";
  STAGE_SEQUENCE.forEach((eIdx, i) => {
    const pip = document.createElement("div");
    pip.className = "stage-pip" + (ENEMY_LIST[eIdx].tag === "BOSS" ? " boss" : "");
    pip.id = `pip${i}`;
    bar.appendChild(pip);
  });
  updateStageProgress();
}

function updateStageProgress() {
  STAGE_SEQUENCE.forEach((_, i) => {
    const pip = $(`pip${i}`);
    if (!pip) return;
    pip.classList.remove("done","current");
    if (i < G.stage) pip.classList.add("done");
    else if (i === G.stage) pip.classList.add("current");
  });
}

function loadStage(idx) {
  const eData = ENEMY_LIST[STAGE_SEQUENCE[idx]];
  G.enemy = { ...eData };
  G.enemyHp = eData.maxHp;
  G.locked = false;

  $("stageLabel").textContent = idx + 1;
  $("scoreVal").textContent = G.score;
  $("enemyName").textContent = eData.name;
  $("enemyTag").textContent = eData.tag;
  $("enemyTag").className = "fighter-tag " +
    (eData.tag === "BOSS" ? "tag-boss" : eData.tag === "ELITE" ? "tag-boss" : "tag-normal");

  const eCard = $("enemyCard");
  eCard.classList.toggle("boss-card", eData.tag === "BOSS");

  $("enemySpriteBox").innerHTML = SPRITES[eData.sprite] || SPRITES.goomba;
  setHpBar($("enemyHpFill"), $("enemyHpTxt"), G.enemyHp, G.enemy.maxHp);
  setHpBar($("playerHpFill"), $("playerHpTxt"), G.playerHp, G.playerMaxHp);

  setBadge("enemyBadge", null, "まっている");
  setBadge("playerBadge", null, "じゅんび");

  if (eData.tag === "BOSS") {
    $("logBox").textContent = "⚠ BOSS出現！\n" + eData.name + "があらわれた！";
    showNotice("⚠ BOSS出現！");
  } else {
    $("logBox").textContent = eData.name + "があらわれた！\nコマンドを選んでください。";
  }

  updateStageProgress();
  disableControls(false);
  updateItemButtons();
}

// ================================================================
// ITEMS
// ================================================================
function updateItemButtons() {
  const map = { mushroom:"itemMushroom", star:"itemStar", flower:"itemFlower", shell:"itemShell" };
  for (const [key, id] of Object.entries(map)) {
    const btn = $(id);
    if (!btn) continue;
    const used = !G.items[key];
    btn.disabled = G.locked || used;
    // show/hide used mark
    let mark = btn.querySelector(".used-mark");
    if (used) {
      if (!mark) {
        mark = document.createElement("div");
        mark.className = "used-mark";
        mark.textContent = "USED";
        btn.appendChild(mark);
      }
    } else {
      if (mark) mark.remove();
    }
  }
}

function useItem(key) {
  if (!G.items[key] || G.locked) return;
  G.items[key] = false;
  updateItemButtons();

  if (key === "mushroom") {
    const heal = 30;
    G.playerHp = clamp(G.playerHp + heal, 0, G.playerMaxHp);
    setHpBar($("playerHpFill"), $("playerHpTxt"), G.playerHp, G.playerMaxHp);
    showDmg("playerDmgPop", heal, true);
    $("logBox").textContent = "🍄 キノコを使った！\nHP が " + heal + " 回復した！";
  } else if (key === "star") {
    G.starActive = true;
    $("logBox").textContent = "⭐ スターを使った！\n次のラウンドは必ず勝つ！";
    showNotice("⭐ STAR POWER!");
  } else if (key === "flower") {
    const heal = 50;
    G.playerHp = clamp(G.playerHp + heal, 0, G.playerMaxHp);
    setHpBar($("playerHpFill"), $("playerHpTxt"), G.playerHp, G.playerMaxHp);
    showDmg("playerDmgPop", heal, true);
    $("logBox").textContent = "🌸 フラワーを使った！\nHP が " + heal + " 回復した！";
  } else if (key === "shell") {
    G.shellActive = true;
    $("logBox").textContent = "🐢 コウラを使った！\n次の攻撃を半減する！";
    showNotice("🐢 SHELL GUARD!");
  }
}

// ================================================================
// BATTLE
// ================================================================
function playRound(playerHand) {
  if (G.locked) return;
  G.locked = true;
  disableControls(true);

  let enemyHand;
  if (G.starActive) {
    // force win: pick hand that beats whatever enemy shows
    enemyHand = randomHand();
    playerHand = Object.keys(HANDS).find(h => HANDS[h].beats === enemyHand) || playerHand;
    G.starActive = false;
  } else {
    enemyHand = randomHand();
  }

  setBadge("playerBadge", playerHand, "");
  setBadge("enemyBadge", enemyHand, "");

  const result = judge(playerHand, enemyHand);
  const e = G.enemy;
  const c = G.char;

  let logMsg = "";

  if (result === "win") {
    const dmg = c.atk + Math.floor(Math.random() * 8);
    G.enemyHp = clamp(G.enemyHp - dmg, 0, e.maxHp);
    setHpBar($("enemyHpFill"), $("enemyHpTxt"), G.enemyHp, e.maxHp);
    triggerAttack("playerSpriteBox");
    triggerImpact("enemyCard", "enemySpriteBox");
    showDmg("enemyDmgPop", dmg, false);
    logMsg = `${HANDS[playerHand].jp} vs ${HANDS[enemyHand].jp}\n✨ 勝ち！ 敵に ${dmg} ダメージ！`;

  } else if (result === "lose") {
    let dmg = e.atk + Math.floor(Math.random() * 8);
    if (G.shellActive) { dmg = Math.floor(dmg / 2); G.shellActive = false; }
    if (c.def > 0) dmg = Math.max(1, dmg - c.def);
    G.playerHp = clamp(G.playerHp - dmg, 0, G.playerMaxHp);
    setHpBar($("playerHpFill"), $("playerHpTxt"), G.playerHp, G.playerMaxHp);
    triggerAttack("enemySpriteBox");
    triggerImpact("playerCard", "playerSpriteBox");
    showDmg("playerDmgPop", dmg, false);
    logMsg = `${HANDS[playerHand].jp} vs ${HANDS[enemyHand].jp}\n💥 負け！ ${dmg} ダメージを受けた！`;

  } else {
    logMsg = `${HANDS[playerHand].jp} vs ${HANDS[enemyHand].jp}\n🤝 あいこ！ ダメージなし`;
  }

  $("logBox").textContent = logMsg;

  setTimeout(() => {
    if (G.playerHp <= 0) {
      showResult(false); return;
    }
    if (G.enemyHp <= 0) {
      G.score += e.reward;
      if (c.luck > 0 && Math.random() * 100 < c.luck) {
        const bonus = Math.floor(e.reward * 0.5);
        G.score += bonus;
        showNotice(`🍀 LUCKY! +${bonus}pt`);
      }
      $("scoreVal").textContent = G.score;
      showResult(true); return;
    }
    G.locked = false;
    disableControls(false);
    updateItemButtons();
  }, 700);
}

// ================================================================
// RESULT
// ================================================================
function showResult(win) {
  const overlay = $("resultOverlay");
  const title = $("resultTitle");
  const sub = $("resultSub");
  const healTxt = $("resultHeal");
  const btnNext = $("btnNext");
  const btnRestart = $("btnRestart");

  const isLastStage = G.stage >= STAGE_SEQUENCE.length - 1;

  if (win) {
    const isWin = true;
    const heal = Math.floor(G.playerMaxHp * 0.2);
    G.playerHp = clamp(G.playerHp + heal, 0, G.playerMaxHp);
    setHpBar($("playerHpFill"), $("playerHpTxt"), G.playerHp, G.playerMaxHp);

    if (isLastStage) {
      title.textContent = "🏆 GAME CLEAR!";
      title.className = "result-title win";
      sub.textContent = `クッパを倒した！\nスコア: ${G.score} pt`;
      healTxt.textContent = `+${heal} HP 回復！`;
      btnNext.style.display = "none";
      btnRestart.textContent = "▶ タイトルへ";
      btnRestart.style.display = "block";
    } else {
      title.textContent = "✨ STAGE CLEAR!";
      title.className = "result-title win";
      sub.textContent = `${G.enemy.name} を倒した！\nスコア: +${G.enemy.reward} pt`;
      healTxt.textContent = `+${heal} HP 回復！`;
      btnNext.style.display = "block";
      btnRestart.style.display = "none";
    }
  } else {
    title.textContent = "💀 GAME OVER";
    title.className = "result-title lose";
    sub.textContent = `${G.enemy.name}にやられた…\nスコア: ${G.score} pt`;
    healTxt.textContent = "";
    btnNext.style.display = "none";
    btnRestart.textContent = "▶ RETRY";
    btnRestart.style.display = "block";
  }

  overlay.classList.add("active");
}

function nextStage() {
  $("resultOverlay").classList.remove("active");
  G.stage++;
  loadStage(G.stage);
}

function goTitle() {
  $("resultOverlay").classList.remove("active");
  G.char = null;
  buildCharGrid();
  showScreen("titleScreen");
}

    <div class="stat-row"><span class="sl">DEF</span><span class="sv">${c.def}</span></div>
    <div class="stat-row"><span class="sl">LUCK</span><span class="sv">${c.luck}</span></div>
    <div class="stat-row"><span class="sl">STAGE</span><span class="sv">${G.stage+1} / ${STAGE_SEQUENCE.length}</span></div>
    <div class="stat-row"><span class="sl">SCORE</span><span class="sv">${G.score}</span></div>
    <div class="stat-row"><span class="sl">🍄 キノコ</span><span class="sv">${itemStatus('mushroom')}</span></div>
    <div class="stat-row"><span class="sl">⭐ スター</span><span class="sv">${itemStatus('star')}</span></div>
    <div class="stat-row"><span class="sl">🌸 フラワー</span><span class="sv">${itemStatus('flower')}</span></div>
    <div class="stat-row"><span class="sl">🐢 コウラ</span><span class="sv">${itemStatus('shell')}</span></div>
  `;

  $("statModal").classList.add("active");
}

function closeStatModal() {
  $("statModal").classList.remove("active");
}

// ================================================================
// INIT
// ================================================================
buildCharGrid();
</script>
</body>
